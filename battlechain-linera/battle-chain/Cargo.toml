[package]
name = "battle-chain"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
linera-sdk = { git = "https://github.com/linera-io/linera-protocol.git", tag = "v0.15.5", features = ["wasmer"] }
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0"

# Local dependencies
shared-types = { path = "../shared-types", package = "battlechain-shared-types" }

[lib]
crate-type = ["cdylib", "rlib"]

[dev-dependencies]
tokio = { version = "1.0", features = ["full", "macros", "rt-multi-thread"] }
